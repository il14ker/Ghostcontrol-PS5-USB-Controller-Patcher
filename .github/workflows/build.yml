name: Build Ghostcontrol
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/upload-artifact@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential git
      - name: Clone PS5 SDK
        run: |
          git clone https://github.com/ps5-payload-dev/sdk.git ~/ps5-payload-sdk
          cd ~/ps5-payload-sdk
          git submodule update --init --recursive || true
      - name: Build
        run: |
          export PS5_PAYLOAD_SDK=~/ps5-payload-sdk
          cd payload
          make clean all
      - name: Upload ELF
        uses: actions/upload-artifact@v3
        with:
          name: ghost-control-ps5
          path: payload/ghost-control-*.elf
